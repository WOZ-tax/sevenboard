name: DB Migration

# 本番DBへの `prisma migrate deploy` は破壊的になりうるため、
# push トリガでの無人自動実行は禁止。手動実行(workflow_dispatch)のみとし、
# さらに `production-db` environment の承認ゲートを通さないと migrate が走らない。
# これによりデプロイ(コンテナ起動)と本番マイグレーションを分離する。
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "MIGRATE" to confirm running prisma migrate deploy against production'
        required: true
        default: ''

jobs:
  migrate:
    name: Apply Migrations
    runs-on: ubuntu-latest
    # GitHub の environment 承認ルール(required reviewers)で人手の承認を必須化する。
    environment: production-db
    # 誤起動の二重ガード: 確認文字列が一致しない限り何もしない。
    if: ${{ github.event.inputs.confirm == 'MIGRATE' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply migrations to production
        id: migrate
        run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: SevenBoard DB migration failed!\nCommit: ${{ github.sha }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
