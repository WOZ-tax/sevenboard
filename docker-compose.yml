services:
  postgres:
    image: postgres:16-alpine
    container_name: sevenboard-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sevenboard
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sevenboard-redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
